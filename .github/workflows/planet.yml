name: planet

on:
  schedule:
    - cron: "6 6 6 * *" # on the 6th day of every month
  workflow_dispatch:

permissions:
  contents: write # needed for GitHub Release uploads
  actions: read   # needed for artifact download

jobs:
  # ── STEP 1: Download each continent PBF, filter with osmium ──
  # (unchanged from upstream — battle-tested)
  download_planet:
    runs-on: ubuntu-latest
    continue-on-error: false

    strategy:
      matrix:
        continent:
          - africa # 7 GB
          - antarctica # 0 GB
          - asia # 14 GB
          - australia-oceania # 1 GB
          - central-america # 1 GB
          - europe # 31 GB
          - north-america # 17 GB
          - south-america # 3 GB

    steps:
      - name: Free up disk space
        uses: BRAINSia/free-disk-space@f9f59b0ef974ff4b873aa243ce5278ab644eedc6
        if: ${{ matrix.continent == 'europe' || matrix.continent == 'north-america' || matrix.continent == 'asia' }}
        with:
          tool-cache: true

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download the planet file for ${{ matrix.continent }}
        run: curl -Lo ./data/full.pbf "https://download.geofabrik.de/${{ matrix.continent }}-latest.osm.pbf"

      - name: Download osmium & print fileinfo
        run: |
          docker run --rm -v $(pwd):/cwd \
            iboates/osmium:1.19.0 \
            fileinfo \
            /cwd/data/full.pbf \

      - name: Run osmium filter-tags
        run: . ./planet.sh

      - name: Rename file
        run: mv data/public/seamarks.pbf "data/${{ matrix.continent }}.pbf"

      - name: Store the slimmed-down planet file as an artifact
        uses: actions/upload-artifact@v6
        with:
          name: planet-${{ matrix.continent }}
          path: data/${{ matrix.continent }}.pbf
          retention-days: 0.5

  # ── STEP 2: Merge all continents → global PMTiles → create Release ──
  generate_global:
    needs: download_planet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download all the seamarks.pbf files from the previous jobs
        uses: actions/download-artifact@v5
        with:
          path: data/tmp_pbf
          pattern: planet-*
          merge-multiple: true

      - name: Merge & sort continent PBFs into single file
        run: |
          docker run --rm -v $(pwd):/cwd \
            iboates/osmium:1.19.0 \
            merge \
            --progress \
            $(printf '/cwd/%s ' data/tmp_pbf/*.pbf) \
            -o /cwd/data/public/seamarks_merged.pbf
          # planetiler requires nodes sorted ascending by ID.
          # osmium merge can produce unsorted output when continents
          # have overlapping boundary data (duplicate nodes).
          docker run --rm -v $(pwd):/cwd \
            iboates/osmium:1.19.0 \
            sort \
            --progress \
            -o /cwd/data/public/seamarks.pbf \
            /cwd/data/public/seamarks_merged.pbf

      - name: Run planetiler (global)
        run: . ./tiles.sh

      - name: Set release metadata
        id: release
        run: |
          echo "tag=data/v$(date +%Y%m%d)" >> $GITHUB_OUTPUT
          echo "name=Seamarks PMTiles — $(date +%B %Y)" >> $GITHUB_OUTPUT

      - name: Upload global PMTiles to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.name }}
          files: data/public/seamarks.pmtiles
          make_latest: true

  # ── STEP 3: Per-continent PMTiles (runs after global, parallel matrix) ──
  generate_continent:
    needs: [download_planet, generate_global]
    runs-on: ubuntu-latest

    strategy:
      matrix:
        continent:
          - africa
          - antarctica
          - asia
          - australia-oceania
          - central-america
          - europe
          - north-america
          - south-america

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download continent PBF artifact
        uses: actions/download-artifact@v5
        with:
          name: planet-${{ matrix.continent }}
          path: data/

      - name: Prepare continent PBF for planetiler
        run: |
          mkdir -p data/public
          cp data/${{ matrix.continent }}.pbf data/public/seamarks.pbf
          rm -f data/public/seamarks.pmtiles

      - name: Run planetiler (${{ matrix.continent }})
        run: . ./tiles.sh

      - name: Rename output
        run: mv data/public/seamarks.pmtiles data/public/seamarks_${{ matrix.continent }}.pmtiles

      - name: Set release tag
        id: tag
        run: echo "tag=data/v$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Upload continent PMTiles to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: data/public/seamarks_${{ matrix.continent }}.pmtiles
