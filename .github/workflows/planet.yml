name: planet

on:
  schedule:
    - cron: "6 6 6 * *" # on the 6th day of every month
  workflow_dispatch:
    inputs:
      skip_download:
        description: 'Skip planet download (use artifacts from previous run)'
        required: false
        default: false
        type: boolean
      previous_run_id:
        description: 'Run ID to download artifacts from (required if skip_download is true)'
        required: false
        default: ''
        type: string

permissions:
  contents: write # needed for GitHub Release uploads
  actions: read   # needed for artifact download

jobs:
  # ── STEP 0: Create empty GitHub Release (tag shared by all uploads) ──
  create_release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Set release metadata
        id: meta
        run: |
          echo "tag=data/v$(date +%Y%m%d)" >> $GITHUB_OUTPUT
          echo "name=Seamarks PMTiles — $(date +%B %Y)" >> $GITHUB_OUTPUT
      - name: Create empty GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          make_latest: true

  # ── STEP 1: Download continent PBFs, filter with osmium ──
  # Skippable via workflow_dispatch input — artifacts persist 12h (retention-days: 0.5)
  download_planet:
    if: ${{ !inputs.skip_download }}
    runs-on: ubuntu-latest
    continue-on-error: false

    strategy:
      matrix:
        continent:
          - africa # 7 GB
          - antarctica # 0 GB
          - asia # 14 GB
          - australia-oceania # 1 GB
          - central-america # 1 GB
          - europe # 31 GB
          - north-america # 17 GB
          - south-america # 3 GB

    steps:
      - name: Free up disk space
        uses: BRAINSia/free-disk-space@f9f59b0ef974ff4b873aa243ce5278ab644eedc6
        if: ${{ matrix.continent == 'europe' || matrix.continent == 'north-america' || matrix.continent == 'asia' }}
        with:
          tool-cache: true

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download the planet file for ${{ matrix.continent }}
        run: curl -Lo ./data/full.pbf "https://download.geofabrik.de/${{ matrix.continent }}-latest.osm.pbf"

      - name: Download osmium & print fileinfo
        run: |
          docker run --rm -v $(pwd):/cwd \
            iboates/osmium:1.19.0 \
            fileinfo \
            /cwd/data/full.pbf \

      - name: Run osmium filter-tags
        run: . ./planet.sh

      - name: Rename file
        run: mv data/public/seamarks.pbf "data/${{ matrix.continent }}.pbf"

      - name: Store the slimmed-down planet file as an artifact
        uses: actions/upload-artifact@v6
        with:
          name: planet-${{ matrix.continent }}
          path: data/${{ matrix.continent }}.pbf
          retention-days: 0.5

  # ── STEP 2: Per-continent PMTiles (runs FIRST — the primary product) ──
  # Downloads one artifact (from current run or previous run if skip_download)
  generate_continent:
    needs: [download_planet, create_release]
    # download_planet is skipped → needs is satisfied (skipped jobs pass automatically)
    if: ${{ !cancelled() && !failure() }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        continent:
          - africa
          - antarctica
          - asia
          - australia-oceania
          - central-america
          - europe
          - north-america
          - south-america

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download continent PBF (from current run artifacts)
        if: ${{ !inputs.skip_download }}
        uses: actions/download-artifact@v5
        with:
          name: planet-${{ matrix.continent }}
          path: data/
          merge-multiple: true

      - name: Download continent PBF (from previous run via gh CLI)
        if: ${{ inputs.skip_download }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download ${{ inputs.previous_run_id }} \
            --repo ${{ github.repository }} \
            --name planet-${{ matrix.continent }} \
            --dir data/

      - name: Prepare continent PBF for planetiler
        run: |
          mkdir -p data/public
          cp data/${{ matrix.continent }}.pbf data/public/seamarks.pbf
          rm -f data/public/seamarks.pmtiles

      - name: Run planetiler (${{ matrix.continent }})
        run: . ./tiles.sh

      - name: Rename output
        run: mv data/public/seamarks.pmtiles data/public/seamarks_${{ matrix.continent }}.pmtiles

      - name: Upload continent PMTiles to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create_release.outputs.tag }}
          files: data/public/seamarks_${{ matrix.continent }}.pmtiles

  # ── STEP 3: Global PMTiles (merge continents → sort → dedup → planetiler) ──
  # osmium merge can produce duplicate (type, ID) pairs when geofabrik continent
  # extracts were generated at slightly different times (version mismatch).
  # dedup.py removes these before planetiler, which requires unique ascending IDs.
  generate_global:
    needs: [download_planet, create_release]
    if: ${{ !cancelled() && !failure() }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download all continent PBFs (from current run artifacts)
        if: ${{ !inputs.skip_download }}
        uses: actions/download-artifact@v5
        with:
          path: data/tmp_pbf
          pattern: planet-*
          merge-multiple: true

      - name: Download all continent PBFs (from previous run via gh CLI)
        if: ${{ inputs.skip_download }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for c in africa antarctica asia australia-oceania central-america europe north-america south-america; do
            gh run download ${{ inputs.previous_run_id }} \
              --repo ${{ github.repository }} \
              --name planet-$c \
              --dir data/tmp_pbf/
          done

      - name: Install pyosmium
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq python3-pyosmium

      - name: Merge, sort & deduplicate continent PBFs
        run: |
          mkdir -p data/public
          # Step 1: Merge 8 continent PBFs (may produce version-based duplicates)
          docker run --rm -v $(pwd):/cwd \
            iboates/osmium:1.19.0 merge --progress \
            $(printf '/cwd/%s ' data/tmp_pbf/*.pbf) \
            -o /cwd/data/public/seamarks_merged.pbf
          # Step 2: Sort (ensures strict ascending ID order)
          docker run --rm -v $(pwd):/cwd \
            iboates/osmium:1.19.0 sort --progress \
            -o /cwd/data/public/seamarks_sorted.pbf \
            /cwd/data/public/seamarks_merged.pbf
          # Step 3: Deduplicate (removes objects with duplicate (type, ID) pairs)
          python3 data/dedup.py \
            data/public/seamarks_sorted.pbf \
            data/public/seamarks.pbf

      - name: Run planetiler (global)
        run: . ./tiles.sh

      - name: Upload global PMTiles to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create_release.outputs.tag }}
          files: data/public/seamarks.pmtiles
          make_latest: true
